name: maina
on:
 push:
jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@main
      - name: Setup Android NDK
        uses: nttld/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r21e
      - name: Setup Java JDK
        uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 11
      - name: setup-haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7
      - name: run libraries from haxe
        run: |
          haxelib setup ~/haxelib
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp
          haxelib install lime 7.9.0
          haxelib install openfl 9.1.0
          haxelib install flixel 4.9.0
          haxelib install flixel-addons 2.9.0
          haxelib install flixel-ui 2.3.3
          haxelib install newgrounds 1.2.0
          haxelib install hscript
          haxelib install hscript-ex
          haxelib git linc_luajit https://github.com/andreirudenko/linc_luajit
          haxelib git polymod https://github.com/swordcube/scriptless-polymod
          haxelib git faxe https://github.com/ashea-code/faxe
          haxelib git discord_rpc https://github.com/aidan63/linc_discord-rpc
      - name: configure android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true
          haxelib run lime rebuild hxcpp
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      - name: compile
        run: haxelib run lime build android
      - name: upload
        uses: actions/upload-artifact@main
        with:
          name: debug
          path: export/release/android/bin/app/build/outputs/apk/debug/*.apk
